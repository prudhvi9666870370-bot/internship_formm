<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internship Application Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background-color: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 600px;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
    }
    p {
      text-align: center;
      color: gray;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }
    textarea {
      resize: vertical;
    }
    button {
      background-color: #3b82f6;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
    }
    button:hover {
      background-color: #2563eb;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Internship Application Form</h1>
    <p>Please fill in the details below to apply for the internship.</p>

    <form id="internshipForm">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone">

      <label for="college">College / University</label>
      <input type="text" id="college" name="college">

      <label for="degree">Degree & Specialization</label>
      <input type="text" id="degree" name="degree">

      <label for="skills">Skills</label>
      <textarea id="skills" name="skills" rows="3"></textarea>

      <label for="reason">Why do you want this internship?</label>
      <textarea id="reason" name="reason" rows="3"></textarea>

      <label for="resume">Upload Resume</label>
      <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required>

      <button type="submit">Submit Application</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('internshipForm');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      // Create a FormData object
      const formData = new FormData(form);

      // Print form data in console
      console.log('Form Submission:');
      for (let [key, value] of formData.entries()) {
        console.log(key, value);
      }

      alert('Application submitted! Check console for data.');
      
      // Reset form after submission
      form.reset();
    });
  </script>

</body>
</html>
